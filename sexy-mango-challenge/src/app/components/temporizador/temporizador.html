<div class="temporizador" [class.urgente]="segundosRestantes() > 0 && segundosRestantes() <= 5">
  <svg class="anillo" viewBox="0 0 100 100">
    <circle class="fondo" cx="50" cy="50" r="44" />
    <circle
      class="progreso"
      cx="50" cy="50" r="44"
      [attr.stroke-dashoffset]="276.5 - (progreso() / 100) * 276.5"
    />
  </svg>
  <span class="numero">{{ segundosRestantes() }}</span>
</div>
